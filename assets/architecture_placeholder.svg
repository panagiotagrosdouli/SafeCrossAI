<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">SafeCrossAI Architecture Placeholder</title>
  <desc id="desc">Research pipeline from infrastructure sensors to prediction, interaction modelling, risk estimation and visualization.</desc>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <style>
    .box { fill: #ffffff; stroke: #1f5a44; stroke-width: 3; rx: 18; }
    .title { font: 700 26px sans-serif; fill: #12372a; }
    .text { font: 500 18px sans-serif; fill: #334155; }
    .arrow { stroke: #1f5a44; stroke-width: 4; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f5a44"/>
    </marker>
  </defs>
  <text x="60" y="55" class="title">SafeCrossAI research pipeline</text>
  <g transform="translate(55,105)">
    <rect class="box" width="180" height="110"/>
    <text x="22" y="45" class="text">Sensors /</text>
    <text x="22" y="72" class="text">Simulation</text>
  </g>
  <line x1="250" y1="160" x2="330" y2="160" class="arrow"/>
  <g transform="translate(345,105)">
    <rect class="box" width="180" height="110"/>
    <text x="24" y="45" class="text">Scene</text>
    <text x="24" y="72" class="text">Representation</text>
  </g>
  <line x1="540" y1="160" x2="620" y2="160" class="arrow"/>
  <g transform="translate(635,105)">
    <rect class="box" width="180" height="110"/>
    <text x="22" y="45" class="text">Trajectory</text>
    <text x="22" y="72" class="text">Prediction</text>
  </g>
  <line x1="830" y1="160" x2="910" y2="160" class="arrow"/>
  <g transform="translate(925,105)">
    <rect class="box" width="210" height="110"/>
    <text x="22" y="45" class="text">Interaction Graph</text>
    <text x="22" y="72" class="text">+ Risk Report</text>
  </g>
  <g transform="translate(360,315)">
    <rect class="box" width="480" height="110"/>
    <text x="30" y="45" class="text">Evaluation · Visualization · Demo GIF</text>
    <text x="30" y="75" class="text">No benchmark claims without reproducible experiments</text>
  </g>
</svg>
