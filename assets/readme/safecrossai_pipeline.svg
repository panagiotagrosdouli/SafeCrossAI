<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc"><title id="title">SafeCrossAI research pipeline</title><desc id="desc">Observed road users, trajectory prediction, interaction graph, TTC and CPA analysis, risk classification, and interpretable warning outputs.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071522"/><stop offset="1" stop-color="#263248"/></linearGradient><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12Z" fill="#75d7ff"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".3"/></filter></defs><rect width="1600" height="720" rx="28" fill="url(#bg)"/><text x="800" y="68" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="42" font-weight="700">SafeCrossAI — Interpretable Interaction-Risk Reasoning</text><text x="800" y="108" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="21">From observed road-user motion to transparent early-warning evidence</text><g filter="url(#s)" font-family="Arial"><rect x="55" y="205" width="255" height="260" rx="24" fill="#112f49" stroke="#4f87b3" stroke-width="2"/><rect x="365" y="205" width="255" height="260" rx="24" fill="#16384b" stroke="#4d9a99" stroke-width="2"/><rect x="675" y="205" width="255" height="260" rx="24" fill="#173b43" stroke="#4dbb98" stroke-width="2"/><rect x="985" y="205" width="255" height="260" rx="24" fill="#40362d" stroke="#d2a65a" stroke-width="2"/><rect x="1295" y="205" width="250" height="260" rx="24" fill="#402d3d" stroke="#ce7dab" stroke-width="2"/><g fill="#f8fafc" text-anchor="middle"><text x="182" y="250" font-size="18" font-weight="700">OBSERVED TRAFFIC</text><text x="182" y="320" font-size="27" font-weight="700">Road-User Tracks</text><text x="182" y="360" font-size="18" fill="#b7c9dc">pedestrians • cyclists</text><text x="182" y="389" font-size="18" fill="#b7c9dc">vehicles • conflict zones</text><text x="492" y="250" font-size="18" font-weight="700">MOTION FORECAST</text><text x="492" y="320" font-size="27" font-weight="700">Future Trajectories</text><text x="492" y="360" font-size="18" fill="#b7c9dc">constant-velocity baseline</text><text x="492" y="389" font-size="18" fill="#b7c9dc">ADE • FDE • miss rate</text><text x="802" y="250" font-size="18" font-weight="700">INTERACTION GRAPH</text><text x="802" y="320" font-size="27" font-weight="700">Pairwise Reasoning</text><text x="802" y="360" font-size="18" fill="#b7c9dc">distance • relative speed</text><text x="802" y="389" font-size="18" fill="#b7c9dc">agent and zone context</text><text x="1112" y="250" font-size="18" font-weight="700">SAFETY INDICATORS</text><text x="1112" y="320" font-size="27" font-weight="700">TTC &amp; CPA</text><text x="1112" y="360" font-size="18" fill="#b7c9dc">closest separation</text><text x="1112" y="389" font-size="18" fill="#b7c9dc">LOW → CRITICAL</text><text x="1420" y="250" font-size="18" font-weight="700">INTERPRETABLE OUTPUT</text><text x="1420" y="320" font-size="27" font-weight="700">Conflict Warning</text><text x="1420" y="360" font-size="18" fill="#b7c9dc">agents • evidence • trigger</text><text x="1420" y="389" font-size="18" fill="#b7c9dc">metrics • reports • media</text></g></g><g stroke="#75d7ff" stroke-width="4" marker-end="url(#a)"><line x1="310" y1="335" x2="350" y2="335"/><line x1="620" y1="335" x2="660" y2="335"/><line x1="930" y1="335" x2="970" y2="335"/><line x1="1240" y1="335" x2="1280" y2="335"/></g><rect x="180" y="545" width="1240" height="100" rx="20" fill="#0a1d2d" stroke="#31526d" stroke-width="2"/><text x="800" y="585" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="23" font-weight="700">Scientific distinction</text><text x="800" y="620" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="19">Interpretable risk categories are research diagnostics, not calibrated collision probabilities</text><text x="800" y="682" text-anchor="middle" fill="#7891a5" font-family="Arial" font-size="16">Synthetic conceptual overview — not deployment evidence or a traffic-control safety guarantee</text></svg>